{% extends 'base.html' %}

{% block title %}Emotion Picker{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <h1 class="card-title mb-3">Emotion Picker</h1>

                    <div class="emotion-board mt-4">
                        <img src="{{ url_for('static', filename='emotions.png') }}"
                             class="img-fluid rounded"
                             alt="A chart of emotions with clickable pictures">

                        {% for emotion in emotions %}
                        <a href="{{ url_for('detail', emotion_id=emotion.id) }}"
                           class="emotion-link"
                           style="left: {{ emotion.position.left }}%; top: {{ emotion.position.top }}%; width: {{ emotion.position.width }}%; height: {{ emotion.position.height }}%;"
                           aria-label="View {{ emotion.title }} emotion">
                            {{ emotion.title }}
                        </a>
                        {% endfor %}
                    </div>

                    <p class="text-muted mt-3">
                        Main image: {{ metadata.format }} format, {{ metadata.width }} x {{ metadata.height }} pixels
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
